name: Deploy Environment
on:
    workflow_call:
        inputs:
            environment:
                required: true
                type: string
            new_tag:
                required: false
                type: string
permissions:
    id-token: write
    contents: read
jobs:
    deploy:
        runs-on: ubuntu-latest
        environment: ${{inputs.environment}}
        steps:
            - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
            - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
              with:
                  node-version: 24
                  registry-url: "https://registry.npmjs.org"
            - name: NPM Install
              run: npm ci
            - if: ${{ inputs.new_tag != '' }}
              name: Set package version from release tag
              run: npm version ${{inputs.new_tag}} --no-git-tag-version --allow-same-version
            - if: ${{ inputs.environment == 'pro' }}
              name: Publish to NPM
              run: npm publish --access public
